<body>
  <main>
    <section class="first-section">
      <h1>Get <span>insights </span>that help your business grow.</h1>
      <p class="main-paragraph">Discover the benefits of data analytics and make better decisions regarding revenue, customer 
  experience, and overall efficiency.</p>
  <div class="div-stats">
    <div class="stats">
      <h2>10k+</h2>
      <p class="stat-headings">companies</p>
    </div>
    <div class="stats">
      <h2>314</h2>
      <p class="stat-headings">templates</p>
    </div>
    <div class="stats">
      <h2>12m+</h2>
      <p class="stat-headings">queries</p>
    </div>
  </div>
    </section>
    <section class="img-section">
      <img src="images/image-header-desktop.jpg" alt="">
    </section>
  </main>
<footer class="attribution">
